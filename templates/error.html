{% extends "base.html" %}
{% block title %}Error{% endblock %}
{% block content %}
<section class="card">
  <h1>Something went wrong</h1>
  <pre class="error">{{ message }}</pre>
  {% if device %}<p class="hint">Device: {{ device.raw_node }} ({{ device.label }})</p>{% endif %}
  <p><a href="{{ url_for('index') }}">Back to root</a></p>
</section>
{% endblock %}
